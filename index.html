<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ramarao Iragavarapu — Senior Frontend Developer building React, React Native, and AI-augmented tooling. Mobile · Web · AI · Design Systems." />
    <meta name="theme-color" content="#0a0814" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Ramarao Iragavarapu — Senior Frontend Developer</title>
    <script>
      // Initial-paint theme — runs before React mounts
      (function () {
        try {
          var t = localStorage.getItem('aur-theme');
          if (t === 'light') {
            document.documentElement.classList.add('aur-light-pre');
            document.documentElement.style.background = '#f5f3ff';
          } else {
            document.documentElement.style.background = '#0a0814';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
